<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Grammar Master Pro - Phân Tích Chi Tiết</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; }

        .header-box {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Giao diện nhập liệu */
        .setup-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            line-height: 1.6;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-check { background: var(--secondary); color: white; width: 100%; margin-top: 15px; }
        .btn-pdf { background: var(--danger); color: white; width: 100%; margin-top: 15px; display: none; }

        /* Kết quả */
        #result-area { display: none; margin-top: 30px; }
        
        .score-summary {
            text-align: center;
            padding: 25px;
            border-radius: 15px;
            background: #fff;
            border: 3px solid #eee;
            margin-bottom: 25px;
        }

        .score-val { font-size: 45px; font-weight: 900; display: block; }

        .card-analysis {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .tag-tense { background: #e3f2fd; color: #1565c0; }
        .tag-grammar { background: #f3e5f5; color: #7b1fa2; }
        .tag-spelling { background: #ffebee; color: #c62828; }
        .tag-word { background: #e8f5e9; color: #2e7d32; }

        .text-diff { margin: 10px 0; font-size: 16px; }
        .original { color: #d32f2f; text-decoration: line-through; opacity: 0.8; }
        .fixed { color: #2e7d32; font-weight: bold; margin-top: 5px; }
        
        .explain-box { 
            background: #fff9c4; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 14px; 
            color: #5d4037;
            margin-top: 12px;
            border-left: 4px solid var(--warning);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏫 AI English Tutor Pro</h2>

    <div id="setup-form" class="setup-group">
        <input type="text" id="sName" placeholder="Tên học sinh" style="flex: 2;">
        <input type="text" id="sClass" placeholder="Lớp" style="flex: 1;">
        <button class="btn btn-check" style="margin-top:0; width:auto;" onclick="startApp()">VÀO LỚP</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header-box">
            <span id="infoDisplay"></span>
            <button onclick="location.reload()" style="background:none; border:none; cursor:pointer; color:#666; font-size:12px;">Đổi thông tin 🔄</button>
        </div>

        <textarea id="userInput" placeholder="Nhập bài viết của em vào đây. Hệ thống sẽ tự tách từng câu để chấm điểm chi tiết..."></textarea>
        
        <button id="checkBtn" class="btn btn-check" onclick="analyzeText()">CHẤM BÀI & PHÂN TÍCH LỖI</button>

        <div id="result-area">
            <div class="score-summary">
                <span id="resScore" class="score-val"></span>
                <span style="color:#666; font-weight:bold;">ĐIỂM TỔNG KẾT</span>
            </div>

            <div id="detailsList"></div>

            <button id="pdfBtn" class="btn btn-pdf" onclick="generatePDF()">📥 XUẤT BÁO CÁO HỌC TẬP (PDF)</button>
        </div>
    </div>
</div>

<script>
    // --- QUAN TRỌNG: DÁN API KEY CỦA BẠN VÀO ĐÂY ---
    const API_KEY = "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";

    function startApp() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();
        if(!name || !sClass) return alert("Vui lòng nhập tên và lớp!");
        
        document.getElementById('infoDisplay').innerHTML = `👤 <b>${name}</b> | 🏫 <b>Lớp ${sClass}</b>`;
        document.getElementById('setup-form').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
    }

    async function analyzeText() {
        const text = document.getElementById('userInput').value.trim();
        const btn = document.getElementById('checkBtn');
        if(!text) return alert("Vui lòng nhập văn bản!");

        btn.disabled = true;
        btn.innerText = "ĐANG PHÂN TÍCH TỪNG CÂU...";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{
                        role: "system",
                        content: `You are an AI English Tutor. Analyze the paragraph by breaking it into sentences.
                        For each sentence, identify the SPECIFIC error type (Tense, Grammar, Spelling, or Word Choice).
                        Return ONLY JSON: {
                          "score": 1-10,
                          "data": [
                            {
                              "tag": "Tense|Grammar|Spelling|Word Choice",
                              "wrong": "original sentence",
                              "right": "corrected sentence",
                              "detail_vn": "Giải thích chi tiết tại sao sai và quy tắc cần nhớ bằng tiếng Việt"
                            }
                          ]
                        }`
                    }, { role: "user", content: text }],
                    response_format: { type: "json_object" }
                })
            });

            const raw = await response.json();
            const result = JSON.parse(raw.choices[0].message.content);

            // Hiển thị điểm
            const sDiv = document.getElementById('resScore');
            sDiv.innerText = `${result.score}/10`;
            sDiv.style.color = result.score >= 8 ? "#2ecc71" : (result.score >= 5 ? "#f39c12" : "#e74c3c");

            // Hiển thị chi tiết
            const list = document.getElementById('detailsList');
            list.innerHTML = "";
            result.data.forEach(item => {
                const tagClass = `tag-${item.tag.split(' ')[0].toLowerCase()}`;
                const card = document.createElement('div');
                card.className = "card-analysis";
                card.innerHTML = `
                    <span class="tag ${tagClass}">${item.tag}</span>
                    <div class="text-diff original">❌ ${item.wrong}</div>
                    <div class="text-diff fixed">✅ ${item.right}</div>
                    <div class="explain-box">
                        <b>📝 Lời khuyên:</b> ${item.detail_vn}
                    </div>
                `;
                list.appendChild(card);
            });

            document.getElementById('result-area').style.display = 'block';
            document.getElementById('pdfBtn').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

        } catch (e) {
            alert("Lỗi hệ thống AI. Vui lòng kiểm tra lại API Key.");
        } finally {
            btn.disabled = false;
            btn.innerText = "CHẤM BÀI & PHÂN TÍCH LỖI";
        }
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const name = document.getElementById('sName').value;
        const resultDiv = document.getElementById('result-area');
        
        const pdfNode = resultDiv.cloneNode(true);
        pdfNode.style.width = "750px";
        pdfNode.style.padding = "30px";
        pdfNode.style.background = "white";
        document.body.appendChild(pdfNode);

        try {
            const canvas = await html2canvas(pdfNode, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const w = pdf.internal.pageSize.getWidth();
            const h = (canvas.height * w) / canvas.width;

            pdf.setFontSize(18);
            pdf.text(`BAO CAO KET QUA: ${name.toUpperCase()}`, 15, 15);
            pdf.addImage(imgData, 'PNG', 0, 20, w, h);
            pdf.save(`Ket_Qua_Grammar_${name}.pdf`);
        } finally {
            document.body.removeChild(pdfNode);
        }
    }
</script>
</body>
</html>
